<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>服务器监控 - 数据表格</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d1117;color:#c9d1d9;padding:20px}
.header{margin-bottom:20px}
.header h1{font-size:20px;color:#58a6ff}
.header p{font-size:13px;color:#8b949e;margin-top:4px}
.table-container{overflow-x:auto;border:1px solid #30363d;border-radius:6px}
table{width:100%;border-collapse:collapse}
th{background:#161b22;color:#8b949e;font-size:12px;font-weight:600;text-align:left;padding:10px 12px;border-bottom:1px solid #30363d;cursor:pointer;user-select:none}
th:hover{color:#c9d1d9}
th .sort-icon{margin-left:4px;font-size:10px;color:#484f58}
td{padding:8px 12px;border-bottom:1px solid #21262d;font-size:13px}
tr:hover{background:#161b22}
.status-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.status-ok{background:#1a3a2a;color:#3fb950}
.status-warn{background:#3a2a1a;color:#d29922}
.status-error{background:#3a1a1a;color:#f85149}
.pagination{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:12px 0}
.pagination button{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:13px;margin:0 2px}
.pagination button:hover:not(:disabled){background:#30363d;border-color:#58a6ff}
.pagination button:disabled{opacity:.4;cursor:not-allowed}
.pagination .page-info{color:#8b949e;font-size:13px}
.preview-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(13,17,23,0.85);z-index:9999;align-items:center;justify-content:center;flex-direction:column}
.preview-overlay h2{color:#d29922;font-size:18px;margin-bottom:8px}
.preview-overlay p{color:#8b949e;font-size:14px}
body.preview-mode .pagination button{pointer-events:none;opacity:0.5}
body.preview-mode th{cursor:default}
</style>
</head>
<body>

</div>

<th>Status</th>
<th>Region</th>
<th>Uptime (days)</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>
<div class="pagination">
<div class="page-info" id="pageInfo"></div>
<div id="pageButtons"></div>
</div>
<div class="preview-overlay" id="previewOverlay">
<h2>Preview Mode</h2>
<p>This is an Agent exam page. Interaction disabled for preview.</p>
</div>

const params=new URLSearchParams(window.location.search);
const isPreview=params.get('preview')==='1';
if(isPreview){document.body.classList.add('preview-mode');document.getElementById('previewOverlay').style.display='flex'}
function render(page){
const start=(page-1)*PAGE_SIZE;
const end=Math.min(start+PAGE_SIZE,servers.length);
const slice=servers.slice(start,end);
const tbody=document.getElementById('tableBody');
tbody.innerHTML=slice.map(s=>`<tr>
<td><code>${s.ip}</code></td><td>${s.host}</td><td>${s.cpu}</td><td>${s.mem}</td><td>${s.disk}</td>
<td><span class="status-badge status-${s.status}">${s.status.toUpperCase()}</span></td>
<td>${s.region}</td><td>${s.up}</td></tr>`).join('');
document.getElementById('pageInfo').textContent=`Showing ${start+1}-${end} of ${servers.length}`;
const totalPages=Math.ceil(servers.length/PAGE_SIZE);
const btns=document.getElementById('pageButtons');
btns.innerHTML='';
const addBtn=(text,p,disabled)=>{
const b=document.createElement('button');b.textContent=text;b.disabled=disabled;
b.onclick=()=>{currentPage=p;render(p)};btns.appendChild(b);
};
addBtn('\u2190 Prev',page-1,page===1);
for(let i=1;i<=totalPages;i++){const b=document.createElement('button');b.textContent=i;b.disabled=false;if(i===page)b.style.background='#1f6feb';b.onclick=()=>{currentPage=i;render(i)};btns.appendChild(b)}
addBtn('Next \u2192',page+1,page===totalPages);
}
render(1);
